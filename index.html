
<!-- CONTACT SECTION BEGINS -->
<section id="contact" style="padding: 60px 20px; text-align: center; font-family: sans-serif;">
  <h2 style="font-size: 2rem; margin-bottom: 10px; color: #333;">Get in Touch</h2>
  <p style="color: #666; margin-bottom: 30px;">Have a question? Leave a message and I will get back to you soon!</p>

  <form action="https://formspree.io/f/xdarqqla" method="POST" style="max-width: 500px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px;">
    
    <input type="text" name="name" placeholder="Your Name" required 
           style="padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem;">
           
    <input type="email" name="email" placeholder="Your Email" required 
           style="padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem;">
           
    <textarea name="message" placeholder="Your Message" rows="5" required 
              style="padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; resize: vertical;"></textarea>
    
    <button type="submit" 
            style="padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; font-weight: bold;">
      Send Message
    </button>

  </form>
</section>
<!-- CONTACT SECTION ENDS -->
